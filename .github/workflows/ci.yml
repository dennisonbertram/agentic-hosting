name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Build
        run: CGO_ENABLED=1 go build ./...
      - name: Test
        run: CGO_ENABLED=1 go test ./... -timeout 60s
