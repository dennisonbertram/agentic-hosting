version: 2
builds:
  - id: ahc
    main: ./cmd/ahc
    binary: ahc
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.Version={{.Version}} -X main.Commit={{.ShortCommit}} -X main.Date={{.Date}}

archives:
  - id: ahc
    builds: [ahc]
    name_template: "ahc_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: 'checksums.txt'

release:
  github:
    owner: dennisonbertram
    name: agentic-hosting
