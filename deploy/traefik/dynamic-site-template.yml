# Copy to /etc/traefik/dynamic/ah-site.yml and replace DOMAIN and CONTAINER_NAME.
# Get CONTAINER_NAME with:
#   docker ps --filter "ancestor=127.0.0.1:5000/ah-website/site:latest" --format "{{.Names}}" | head -1
#
# Use the container name (not IP) so routing survives container restarts.
# Docker DNS resolves container names on the same network, so Traefik can reach
# the container by name regardless of what IP Docker assigns after a restart.

http:
  routers:
    ah-site-root-http:
      rule: "Host(`DOMAIN`) || Host(`www.DOMAIN`)"
      entryPoints:
        - web
      middlewares:
        - ah-site-redirect-https
      service: ah-site-svc
    ah-site-root:
      rule: "Host(`DOMAIN`) || Host(`www.DOMAIN`)"
      entryPoints:
        - websecure
      service: ah-site-svc
      tls:
        certResolver: letsencrypt
  middlewares:
    ah-site-redirect-https:
      redirectScheme:
        scheme: https
        permanent: true

  services:
    ah-site-svc:
      loadBalancer:
        servers:
          - url: "http://CONTAINER_NAME:80"
